name: Call-CICD-Pipeline

on:
  push:
    branches:
      - main
jobs:
  call-workflow:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python-version: "3.12"

  check-result:
    runs-on: ubuntu-latest
    needs: call-workflow
    steps:
      - name: print results
        run: echo "Result = ${{ needs.call-workflow.outputs.result }}"

    
