name: CICD-Pipeline 

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to be used"
        required: false
        type: string      

      run_tests:
        description: "Test to be run"
        required: false
        default: true
        type: boolean

    outputs:
      result:
        value: ${{ jobs.cicd-workflow.outputs.job_result }} 

jobs:
  cicd-workflow:
    runs-on: ubuntu-latest
    outputs:
      job_result: ${{ steps.set_result.outputs.test_result }} 
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up the language runtime
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version  || '3.10' }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (only if run_tests is true)
        id: run_test
        if: ${{ inputs.run_tests }}
        run: |
           echo "Running test..."
           exit 0 

      - name: Set output test_result 
        id: set_result
        run: |
          if [ "${{ inputs.run_tests }}" != "true" ]; then
            echo "test_result=skipped" >> $GITHUB_OUTPUT
          elif [ "${{ steps.run_test.outputs }}" == "success" ]; then
            echo "test_result=passed" >> $GITHUB_OUTPUT
          else 
            echo "test_result=failed" >> $GITHUB_OUTPUT
          fi

