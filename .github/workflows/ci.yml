name: ci-pipeline

on:
  push:
    branches:
      - main

jobs:
  build-ci:
    runs-on: ubuntu-latest
    steps:
      - name: check repo
        uses: actions/checkout@v4
      - name: setup language
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: install dependencies
        run: npm install 
      - name: Run lint test
        run: npm run lint
